<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar bg-white shadow-sm px-4 mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">Attendance Portal</a>
    </div>
  </nav>

  <div class="container py-4">

    <h2 class="text-primary fw-bold mb-3">Extracted Attendance Data</h2>
    <p class="text-muted">Showing data extracted from: <b>{{ filename }}</b></p>

    <div class="table-responsive">
      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            {% for col in rows[0] %}
              <th>{{ col }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for row in rows[1:] %}
            <tr>
              {% for cell in row %}
                <td>{{ cell }}</td>
              {% endfor %}
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <a href="/" class="btn btn-secondary mt-3">Back to Portal</a>

  </div>
</body>
</html>
