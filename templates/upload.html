<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Attendance Sheet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar bg-white shadow-sm px-4 mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">Attendance Portal</a>

      <div>
        <a href="/login" class="text-decoration-none text-dark">
          <i class="fa-solid fa-user fa-lg"></i>
        </a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="text-center mb-5">
      <h1 class="fw-bold text-primary">Upload Attendance Sheet</h1>
      <p class="text-muted">Upload a scanned PDF to begin processing attendance.</p>
    </div>

    <div class="card shadow-sm border-0 mx-auto" style="max-width: 600px;">
      <div class="card-body p-4">
        
        <!-- IMPORTANT: file upload requires multipart/form-data -->
        <form action="/upload" method="POST" enctype="multipart/form-data">

          <div class="mb-4">
            <label for="file" class="form-label fw-semibold">Select File</label>
            <input type="file" id="file" name="file" class="form-control" 
                   accept=".pdf, .jpg, .jpeg, .png" required>
            <small class="text-muted">Supported formats: PDF, JPG, PNG</small>
          </div>

          <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-outline-secondary">Back</a>
            <button type="submit" class="btn btn-primary">Upload File</button>
          </div>

        </form>

      </div>
    </div>
  </div>

</body>
</html>
