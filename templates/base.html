<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Attendance Portal{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar bg-white shadow-sm px-4 mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">Attendance Portal</a>

      <div class="d-flex align-items-center gap-3">
        {% if session.get('user_id') %}

          <a href="/profile" class="text-decoration-none text-muted">
            <i class="fa-solid fa-user me-1"></i>
            {{ session.get('username') }}
          </a>

          <form method="POST" action="/logout" class="m-0">
            <button type="submit" class="btn btn-sm btn-outline-danger">Logout</button>
          </form>

        {% else %}
        
          <a href="/login" class="text-decoration-none text-dark" title="Login">
            <i class="fa-solid fa-user fa-lg"></i>
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
